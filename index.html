<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="index.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangman Game</title>
  </head>
  <body>
    <div class="game_container">
      <div id="startScreen" class="hidden">
        <h1 class="game-title">
          <span class="small">THE</span>
          HANGMAN
          <span class="small">GAME</span>
          <div id="wordContainer"></div>
        </h1>

        <button id="playBtn" class="play_btn">PLAY</button>
      </div>

      <div id="categoryScreen" class="hidden">
        <button id="backBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path
              d="M24 192l144 0c9.7 0 18.5-5.8 22.2-14.8s1.7-19.3-5.2-26.2l-46.7-46.7c75.3-58.6 184.3-53.3 253.5 15.9 75 75 75 196.5 0 271.5s-196.5 75-271.5 0c-10.2-10.2-19-21.3-26.4-33-9.5-14.9-29.3-19.3-44.2-9.8s-19.3 29.3-9.8 44.2C49.7 408.7 61.4 423.5 75 437 175 537 337 537 437 437S537 175 437 75C342.8-19.3 193.3-24.7 92.7 58.8L41 7C34.1 .2 23.8-1.9 14.8 1.8S0 14.3 0 24L0 168c0 13.3 10.7 24 24 24z"
            />
          </svg>
        </button>

        <div class="categories">
          <button class="category-btn" data-category="movies">Movies</button>
          <button class="category-btn" data-category="sport">Sport</button>
          <button class="category-btn" data-category="countries">
            Countries
          </button>
          <button class="category-btn" data-category="capitals">
            Capitals
          </button>
          <button class="category-btn" data-category="animals">Animals</button>
        </div>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
